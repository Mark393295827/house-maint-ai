version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: housemaint
      POSTGRES_USER: housemaint
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-housemaint_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U housemaint" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./server/uploads:/app/uploads
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://housemaint:${POSTGRES_PASSWORD:-housemaint_secret}@postgres:5432/housemaint
      - JWT_SECRET=${JWT_SECRET:-house-maint-ai-secret-key-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
