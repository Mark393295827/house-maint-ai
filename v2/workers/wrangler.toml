name = "house-maint-ai-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
node_compat = true

[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }

# R2 Bucket for image storage
[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "house-maint-images"

# KV for caching
[[kv_namespaces]]
binding = "CACHE"
id = "placeholder-kv-id"
preview_id = "placeholder-kv-preview-id"
