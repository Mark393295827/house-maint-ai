name: AI Regression Test (Swarm Check)

on:
  schedule:
    - cron: '0 2 * * 0' # Run at 02:00 on Sunday
  pull_request:
    paths:
      - 'server/agents/**'
      - 'server/services/diagnostics_claw.ts'
      - 'server/services/planning_claw.ts'
      - 'server/services/vendor_claw.ts'
      - 'server/services/ai.ts'
  workflow_dispatch:

jobs:
  verify:
    name: Verify AI Swarm Logic
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: house_maint
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Initialize Database
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: house_maint
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          cd server
          npm run db:migrate
          npm run init-db

      - name: Run Swarm Verification Script
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: house_maint
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          cd server
          npx tsx scripts/verify-swarm.ts
